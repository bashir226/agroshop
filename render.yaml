services:
  - type: web
    name: agroshop-backend
    env: node
    plan: free
    buildCommand: cd agroshop/backend && npm install
    startCommand: cd agroshop/backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
    healthCheckPath: /api/health

  - type: web
    name: agroshop-frontend
    env: node
    plan: free
    buildCommand: cd agroshop/frontend && npm install && npm run build
    startCommand: cd agroshop/frontend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false
    dependsOn:
      - agroshop-backend

databases:
  - name: agroshop-db
    plan: free
    databaseName: agroshop
    user: agroshop
