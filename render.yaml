databases:
  - name: agroshop-db
    plan: free
    databaseName: agroshop
    user: agroshop

services:
  - type: web
    name: agroshop-backend
    env: node
    plan: free
    rootDir: agroshop/backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: agroshop-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
    healthCheckPath: /api/health

  - type: web
    name: agroshop-frontend
    env: node
    plan: free
    rootDir: agroshop/frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false
